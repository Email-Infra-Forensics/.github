<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#1a1528" stroke="url(#grad)" stroke-width="2"/>
  <g filter="url(#glow)" stroke="url(#grad)" stroke-width="3">
    <line x1="30" y1="30" x2="70" y2="30"/>
    <line x1="50" y1="30" x2="50" y2="70"/>
    <line x1="30" y1="70" x2="70" y2="70"/>
    <circle cx="30" cy="30" r="6" fill="#1a1528"/>
    <circle cx="70" cy="30" r="6" fill="#1a1528"/>
    <circle cx="50" cy="50" r="6" fill="#1a1528"/>
    <circle cx="30" cy="70" r="6" fill="#1a1528"/>
    <circle cx="70" cy="70" r="6" fill="#1a1528"/>
  </g>
</svg>
